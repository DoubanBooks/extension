name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Install dependencies
        run: npm ci

      - name: Bump version and generate changelog
        id: release
        run: |
          npx standard-version --no-verify
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Push version bump
        run: |
          git push origin HEAD:master
          git push origin --tags

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION }}
          release_name: Release v${{ env.VERSION }}
          body: |
            ## Changelog

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ## Download

            - [DoubanBooksPlusPlus.zip](https://github.com/DoubanBooks/extension/releases/download/v${{ env.VERSION }}/DoubanBooksPlusPlus.zip)

      - name: Zip extension
        run: zip -r DoubanBooksPlusPlus.zip . -x "*.git*" "node_modules/*" ".github/*"

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./DoubanBooksPlusPlus.zip
          asset_name: DoubanBooksPlusPlus.zip
          asset_content_type: application/zip